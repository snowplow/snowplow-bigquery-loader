{

  license {
    accept = false
    accept = ${?ACCEPT_LIMITED_USE_LICENSE}
  }

  "output": {
    "good": {
      "table": "events"
    }
  }

  "batching": {
    "maxBytes": 10000000
    "maxDelay": "1 second"
    "writeBatchConcurrency": 2
  }

  "cpuParallelism" {
    "parseBytesFactor": 0.1
    "transformFactor": 0.75
  }

  "retries": {
    "setupErrors": {
      "delay": "30 seconds"
    }
    "transientErrors": {
      "delay": "1 second"
      "attempts": 5
    }
    "alterTableWait": {
      "delay": "1 second"
    }
    "tooManyColumns": {
      "delay": "300 seconds"
    }
  }

  "skipSchemas": []
  "legacyColumns": []
  "legacyColumnMode": false
  "exitOnMissingIgluSchema": true

  "decompression": {
    "maxBytesInBatch": 5242880
    "maxBytesSinglePayload": 10000000
  }

  "http": {
    "client": ${snowplow.defaults.http.client}
  }

  "monitoring": {
    "metrics": {
      "statsd": ${snowplow.defaults.statsd}
      "statsd": {
        "prefix": "snowplow.bigquery-loader"
      }
      "prometheus": ${snowplow.defaults.prometheus}
    }
    "webhook": ${snowplow.defaults.webhook}
    "sentry": {
      "tags": {
      }
    }
    "healthProbe": {
      "port": "8000"
      "unhealthyLatency": "5 minutes"
    }
  }

  "telemetry": ${snowplow.defaults.telemetry}
}
